<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Switzerland Interactive GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* إعدادات الصفحة */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f1ea; 
        }

        /* تصميم الإطار (Frame) */
        .map-frame {
            width: 92%; 
            height: 88%;
            padding: 20px;
            background-color: #ffffff; 
            border: 1px solid #ddd; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            display: flex;
            flex-direction: column;
        }

        .map-title {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        #map { 
            flex-grow: 1; 
            width: 100%; 
            border-radius: 15px; 
            border: 1px solid #eee;
        }

        /* تنسيق أسماء الولايات (Labels) */
        .canton-label {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #d35400;
            padding: 2px 6px;
            font-weight: bold;
            font-size: 11px;
            border-radius: 4px;
            color: #d35400;
        }

        /* تنسيق مفتاح الخريطة (Legend) */
        .legend {
            background: white;
            padding: 12px;
            line-height: 20px;
            color: #333;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        .legend i {
            width: 16px;
            height: 16px;
            float: left;
            margin-right: 10px;
            opacity: 0.8;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="map-frame">
        <div class="map-title">Switzerland Geomatics Project</div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. إعداد الخريطة
        var map = L.map('map').setView([46.8182, 8.2275], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // إضافة مقياس الرسم (Scale) - لمسة هندسية ضرورية
        L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

        // 2. تحميل الولايات مع الأسماء
        fetch('switzerland.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#d35400", weight: 2, fillOpacity: 0.3 },
                    onEachFeature: function (feature, layer) {
                        var name = feature.properties.NAME || feature.properties.name || feature.properties.NAME_1;
                        if (name) {
                            layer.bindTooltip(name, { permanent: true, direction: "center", className: "canton-label" });
                        }
                    }
                }).addTo(map);
            });

        // 3. تحميل الطرق
        fetch('main_roads.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#2c3e50", weight: 1.5, opacity: 0.7 } }).addTo(map);
            });

        // 4. إضافة المعالم (Landmarks)
        var landmarks = [
            { name: "Matterhorn", coords: [45.9763, 7.6586], info: "أشهر قمة جبلية" },
            { name: "Jet d'Eau", coords: [46.2074, 6.1559], info: "نافورة جنيف" },
            { name: "Chillon Castle", coords: [46.4142, 6.9275], info: "قلعة تاريخية" }
        ];

        landmarks.forEach(function(place) {
            L.circleMarker(place.coords, {
                radius: 6,
                fillColor: "#e74c3c",
                color: "#fff",
                weight: 2,
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>" + place.name + "</b><br>" + place.info);
        });

        // 5. إضافة مفتاح الخريطة (Legend)
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4 style="margin:0 0 8px">Legend</h4>';
            div.innerHTML += '<i style="background: rgba(211, 84, 0, 0.4); border: 1px solid #d35400"></i> Cantons<br>';
            div.innerHTML += '<i style="background: #2c3e50; height: 2px; margin-top: 9px"></i> Main Roads<br>';
            div.innerHTML += '<i style="background: #e74c3c; border-radius: 50%; width: 10px; height: 10px; margin-top: 5px; border: 1px solid #fff"></i> Key Landmarks';
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
