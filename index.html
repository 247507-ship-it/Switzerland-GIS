<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مشروع جيوماتكس سويسرا</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([46.8182, 8.2275], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function addLayer(fileName, style) {
            fetch(fileName)
                .then(res => res.json())
                .then(data => L.geoJSON(data, { style: style }).addTo(map));
        }

        // استدعاء ملفاتك
        addLayer('switzerland.geojson', { color: "red", weight: 2, fillOpacity: 0.1 });
        addLayer('main_roads.geojson', { color: "#333", weight: 1 });
    </script>
</body>
</html>
