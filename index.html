<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خريطة سويسرا - مشروع جيوماتكس</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        
        /* تنسيق أسماء الولايات */
        .canton-label {
            background: rgba(255, 255, 255, 0.7);
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #d32f2f;
            font-size: 10px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. إعداد الخريطة والتركيز على سويسرا
    var map = L.map('map').setView([46.8182, 8.2275], 8);

    // 2. إضافة خريطة الأساس (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 3. إضافة طبقة الولايات مع الأسماء (Labels)
    fetch('switzerland.geojson')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: { color: "red", weight: 2, fillOpacity: 0.05 },
                onEachFeature: function (feature, layer) {
                    // محاولة قراءة الاسم من الحقول الممكنة في ملفك
                    var name = feature.properties.NAME || feature.properties.name || feature.properties.NAME_1;
                    if (name) {
                        layer.bindTooltip(name, {
                            permanent: true,
                            direction: "center",
                            className: "canton-label"
                        });
                    }
                }
            }).addTo(map);
        });

    // 4. إضافة طبقة الطرق
    fetch('main_roads.geojson')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, { style: { color: "#333", weight: 1 } }).addTo(map);
        });

    // 5. إضافة المعالم (Symbols)
    var landmarks = [
        { name: "Matterhorn", coords: [45.9763, 7.6586], desc: "جبل ماترهورن" },
        { name: "Jet d'Eau", coords: [46.2074, 6.1559], desc: "نافورة جنيف" },
        { name: "Grossmünster", coords: [47.3701, 8.5438], desc: "كنيسة زيورخ" }
    ];

    landmarks.forEach(function(place) {
        L.circleMarker(place.coords, {
            radius: 7,
            fillColor: "#ff7800",
            color: "#000",
            weight: 1,
            fillOpacity: 0.8
        }).addTo(map).bindPopup("<b>" + place.name + "</b><br>" + place.desc);
    });

</script>
</body>
</html>
